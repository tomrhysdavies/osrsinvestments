<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSRS GE Market Watch</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center border-b border-gray-800 pb-4 mb-6 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-amber-500 tracking-wide flex items-center gap-2">⚔️ OSRS GE Market Watch</h1>
                <p class="text-gray-400 text-sm mt-1">Track live banking tabs or analyze historical completed trade statistics.</p>
            </div>
            <div class="flex bg-gray-950 p-1 rounded-lg border border-gray-800">
                <button id="tab-live" onclick="switchView('live')" class="px-4 py-2 text-xs font-bold rounded transition-colors bg-amber-600 text-gray-900">📈 Live Market Desk</button>
                <button id="tab-history" onclick="switchView('history')" class="px-4 py-2 text-xs font-bold rounded transition-colors text-gray-400 hover:text-gray-200">📜 Archived Trade Ledger</button>
            </div>
        </header>

        <div id="panel-live" class="space-y-8">
            <div class="flex justify-end items-center gap-3">
                <span id="sync-indicator" class="text-xs bg-gray-800 px-3 py-1.5 rounded-md border border-gray-700 text-gray-400">Status: Initializing...</span>
                <button onclick="fetchLivePrices()" class="bg-amber-600 hover:bg-amber-500 text-gray-900 font-bold px-4 py-2 rounded shadow transition-all text-sm">🔄 Synchronize Prices</button>
            </div>

            <!-- SECTION 1: HIGH VOLUME ITEMS -->
            <section class="bg-gray-800 rounded-xl border border-gray-700 p-6 shadow-xl">
                <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 mb-6 border-b border-gray-700 pb-4">
                    <div>
                        <h2 class="text-xl font-bold text-amber-400">High Volume Commodities Watchlist</h2>
                        <p class="text-xs text-gray-400">Heatmapped rows isolate action zones.</p>
                    </div>
                </div>

                <div class="flex flex-wrap gap-2 mb-4 border-b border-gray-700/40 pb-3">
                    <button id="subtab-gathering" onclick="switchSubTab('gathering')" class="px-3 py-1.5 text-xs font-bold rounded bg-gray-900 text-amber-400 border border-gray-700">⛏️ Gathering</button>
                    <button id="subtab-combat" onclick="switchSubTab('combat')" class="px-3 py-1.5 text-xs font-bold rounded bg-gray-800 text-gray-400 hover:text-gray-200">☠️ Combat</button>
                    <button id="subtab-herbs" onclick="switchSubTab('herbs')" class="px-3 py-1.5 text-xs font-bold rounded bg-gray-800 text-gray-400 hover:text-gray-200">🧪 Herbs</button>
                    <button id="subtab-alchables" onclick="switchSubTab('alchables')" class="px-3 py-1.5 text-xs font-bold rounded bg-gray-800 text-gray-400 hover:text-gray-200">💰 Alchables</button>
                    <button id="subtab-ammo" onclick="switchSubTab('ammo')" class="px-3 py-1.5 text-xs font-bold rounded bg-gray-800 text-gray-400 hover:text-gray-200">🏹 Ammo</button>
                    <button id="subtab-custom" onclick="switchSubTab('custom')" class="px-3 py-1.5 text-xs font-bold rounded bg-gray-800 text-gray-400 hover:text-gray-200">⭐ Custom</button>
                </div>
                
                <table class="w-full text-left border-collapse table-auto">
                    <thead>
                        <tr class="text-xs text-gray-400 uppercase tracking-wider border-b border-gray-700">
                            <th class="pb-3 pl-2">Item Name</th>
                            <th class="pb-3 text-right">Price</th>
                            <th class="pb-3 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="slayer-loot-rows" class="divide-y divide-gray-700/30 text-sm"></tbody>
                </table>
            </section>

            <!-- SECTION 3: FLIPPING RADAR -->
            <section class="bg-gray-800 rounded-xl border border-gray-700 p-6 shadow-xl">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4">
                    <h2 class="text-xl font-bold text-emerald-400">⚡ Global High-Yield Flipping Radar</h2>
                    <div class="bg-gray-950 p-1 rounded-lg border border-gray-700 flex items-center">
                        <button id="filter-all" onclick="setPriceFilter('all')" class="px-3 py-1 text-xs font-bold rounded bg-amber-600 text-gray-900 transition-all">All</button>
                        <button id="filter-premium" onclick="setPriceFilter('premium')" class="px-3 py-1 text-xs font-bold rounded text-gray-400 hover:text-gray-200 transition-all">👑 1M+ Only</button>
                    </div>
                </div>
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="text-xs text-gray-400 uppercase tracking-wider border-b border-gray-700">
                            <th class="pb-3">Item</th>
                            <th class="pb-3 text-right">Buy</th>
                            <th class="pb-3 text-right">Sell</th>
                            <th class="pb-3 text-right">Profit/U</th>
                            <th class="pb-3 text-center">Limit</th>
                            <th class="pb-3 text-right text-cyan-400">Max Yield</th>
                        </tr>
                    </thead>
                    <tbody id="flipping-radar-rows" class="divide-y divide-gray-700/50"></tbody>
                </table>
            </section>
        </div>
    </div>

    <script>
        const MASTER_BLUEPRINT_LIST = [
            { id: 451, name: "Runite Ore", group: "gathering" }, { id: 453, name: "Coal", group: "gathering" },
            { id: 440, name: "Iron Ore", group: "gathering" }, { id: 2363, name: "Runite Bar", group: "gathering" },
            { id: 2361, name: "Adamantite Bar", group: "gathering" }, { id: 1515, name: "Yew Logs", group: "gathering" },
            { id: 1513, name: "Magic Logs", group: "gathering" }, { id: 8782, name: "Mahogany Plank", group: "gathering" },
            { id: 561, name: "Nature Rune", group: "gathering" }, { id: 560, name: "Death Rune", group: "gathering" },
            { id: 565, name: "Blood Rune", group: "gathering" }, { id: 566, name: "Soul Rune", group: "gathering" },
            { id: 21880, name: "Wrath Rune", group: "gathering" }, { id: 9144, name: "Runite Bolt", group: "gathering" },
            { id: 11212, name: "Dragon Arrow", group: "gathering" }, { id: 536, name: "Dragon Bones", group: "combat" },
            { id: 11943, name: "Lava Dragon Bones", group: "combat" }, { id: 22124, name: "Superior Dragon Bones", group: "combat" },
            { id: 6729, name: "Dagannoth Bones", group: "combat" }, { id: 22786, name: "Hydra Bones", group: "combat" },
            { id: 1747, name: "Black Dragonhide", group: "combat" }, { id: 1749, name: "Red Dragonhide", group: "combat" },
            { id: 1751, name: "Blue Dragonhide", group: "combat" }, { id: 1753, name: "Green Dragonhide", group: "combat" },
            { id: 1615, name: "Dragonstone", group: "combat" }, { id: 1631, name: "Uncut Dragonstone", group: "combat" },
            { id: 1617, name: "Uncut Diamond", group: "combat" }, { id: 1619, name: "Uncut Ruby", group: "combat" },
            { id: 1621, name: "Uncut Emerald", group: "combat" }, { id: 1623, name: "Uncut Sapphire", group: "combat" },
            { id: 1127, name: "Rune Platebody", group: "alchables" }, { id: 1079, name: "Rune Platelegs", group: "alchables" },
            { id: 4585, name: "Dragon Plateskirt", group: "alchables" }, { id: 4087, name: "Dragon Platelegs", group: "alchables" },
            { id: 1319, name: "Rune 2h Sword", group: "alchables" }, { id: 1333, name: "Rune Scimitar", group: "alchables" },
            { id: 1305, name: "Dragon Longsword", group: "alchables" }, { id: 4587, name: "Dragon Scimitar", group: "alchables" },
            { id: 1377, name: "Dragon Battleaxe", group: "alchables" }, { id: 21944, name: "Onyx Bolts (e)", group: "ammo" },
            { id: 9144, name: "Runite bolts", group: "ammo" }, { id: 892, name: "Rune Arrow", group: "ammo" },
            { id: 21946, name: "Diamond bolts (e)", group: "ammo" }, { id: 11237, name: "Dragon dart tip", group: "ammo" },
            { id: 2440, name: "Super Strength(4)", group: "herbs" }, { id: 12695, name: "Super Combat Potion(4)", group: "herbs" }
        ];

        let userDatabase = { slayerLoot: [], investments: [], history: [] };
        let itemDictionary = null; 
        let rawLivePrices = null; 
        let currentPriceFilter = "all"; 
        let activeSubTab = "gathering"; 

        async function initApp() {
            const localData = localStorage.getItem("osrs_dashboard_db");
            userDatabase = localData ? JSON.parse(localData) : { slayerLoot: [], investments: [], history: [] };
            MASTER_BLUEPRINT_LIST.forEach(b => { if (!userDatabase.slayerLoot.find(i => i.id === b.id)) userDatabase.slayerLoot.push(b); });
            saveToLocalStorage();
            await fetchItemDictionary();
            await fetchLivePrices();
        }

        function saveToLocalStorage() { localStorage.setItem("osrs_dashboard_db", JSON.stringify(userDatabase)); }
        
        async function fetchItemDictionary() {
            const res = await fetch("https://prices.runescape.wiki/api/v1/osrs/mapping", { headers: {'User-Agent': 'Market Tool'} });
            const arr = await res.json();
            itemDictionary = {};
            arr.forEach(i => { itemDictionary[i.name.trim().toLowerCase()] = { id: i.id, name: i.name.trim(), limit: i.limit || 0 }; });
        }

        async function fetchLivePrices() {
            const res = await fetch("https://prices.runescape.wiki/api/v1/osrs/1h", { headers: {'User-Agent': 'Market Tool'} });
            rawLivePrices = (await res.json()).data;
            const radarRes = await fetch("https://prices.runescape.wiki/api/v1/osrs/5m", { headers: {'User-Agent': 'Market Tool'} });
            const radarPrices = (await radarRes.json()).data;
            
            const activeItems = userDatabase.slayerLoot.filter(i => activeSubTab === "custom" ? !i.group : i.group === activeSubTab);
            renderSlayerTable(rawLivePrices, activeItems);
            renderFlippingRadar(radarPrices || rawLivePrices); 
        }

        function renderSlayerTable(prices, items) {
            const t = document.getElementById("slayer-loot-rows"); t.innerHTML = "";
            items.forEach((item, idx) => {
                const live = prices[item.id];
                const price = live ? (live.avgLowPrice || live.avgHighPrice || 0) : 0;
                t.innerHTML += `<tr class="hover:bg-gray-700/20">
                    <td class="py-3 pl-3 font-semibold">${item.name}</td>
                    <td class="py-3 text-right text-gray-400">-</td><td class="py-3 text-right text-gray-400">-</td>
                    <td class="py-3 text-right text-amber-500 font-bold">${price.toLocaleString()}</td>
                    <td class="py-3 text-center">-</td>
                    <td class="py-3 text-center"><button onclick="deleteAsset(${idx})" class="text-rose-400 text-xs">Remove</button></td>
                </tr>`;
            });
        }

        function renderFlippingRadar(prices) {
            const t = document.getElementById("flipping-radar-rows"); t.innerHTML = "";
            const list = Object.keys(itemDictionary).map(k => {
                const meta = itemDictionary[k];
                const live = prices[meta.id];
                if (!live || !live.avgHighPrice || !live.avgLowPrice || !meta.limit) return null;
                if (currentPriceFilter === "premium" && live.avgLowPrice < 1000000) return null;
                const profit = (live.avgHighPrice - live.avgLowPrice) - Math.min(Math.floor(live.avgHighPrice * 0.02), 5000000);
                const yieldGP = profit * meta.limit;
                if (yieldGP < 200000) return null;
                return { name: meta.name, buy: live.avgLowPrice, sell: live.avgHighPrice, profit, limit: meta.limit, yieldGP };
            }).filter(i => i !== null).sort((a,b) => b.yieldGP - a.yieldGP).slice(0, 10);
            
            list.forEach(i => {
                t.innerHTML += `<tr class="hover:bg-gray-700/20">
                    <td class="py-3">${i.name}</td>
                    <td class="py-3 text-right">${i.buy.toLocaleString()}</td>
                    <td class="py-3 text-right">${i.sell.toLocaleString()}</td>
                    <td class="py-3 text-right text-emerald-400">+${i.profit.toLocaleString()}</td>
                    <td class="py-3 text-center">${i.limit.toLocaleString()}</td>
                    <td class="py-3 text-right text-cyan-400 font-bold">${i.yieldGP.toLocaleString()} GP</td>
                </tr>`;
            });
        }
        
        function switchSubTab(t) { activeSubTab = t; fetchLivePrices(); }
        function setPriceFilter(m) { currentPriceFilter = m; renderFlippingRadar(rawLivePrices); }
        function deleteAsset(idx) { userDatabase.slayerLoot.splice(idx, 1); saveToLocalStorage(); fetchLivePrices(); }
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
