<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSRS GE Market Watch</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">
    <div class="max-w-7xl mx-auto px-4 py-8">
        <header class="flex justify-between items-center border-b border-gray-800 pb-4 mb-6">
            <h1 class="text-3xl font-extrabold text-amber-500">⚔️ OSRS GE Market Watch</h1>
            <div class="flex bg-gray-950 p-1 rounded-lg border border-gray-800">
                <button id="tab-live" onclick="switchView('live')" class="px-4 py-2 text-xs font-bold rounded bg-amber-600 text-gray-900">📈 Live Market Desk</button>
                <button id="tab-history" onclick="switchView('history')" class="px-4 py-2 text-xs font-bold rounded text-gray-400">📜 Archived Trade Ledger</button>
            </div>
        </header>

        <div id="panel-live" class="space-y-8">
            <div class="flex justify-end"><button onclick="fetchLivePrices()" class="bg-amber-600 text-gray-900 font-bold px-4 py-2 rounded text-sm">🔄 Synchronize</button></div>

            <section class="bg-gray-800 rounded-xl border border-gray-700 p-6">
                <div class="flex flex-wrap gap-2 mb-4 border-b border-gray-700/40 pb-3">
                    <button onclick="switchSubTab('gathering')" class="px-3 py-1.5 text-xs font-bold rounded bg-gray-900 text-amber-400 border border-gray-700">⛏️ Gathering</button>
                    <button onclick="switchSubTab('combat')" class="px-3 py-1.5 text-xs font-bold rounded bg-gray-800 text-gray-400">☠️ Combat</button>
                    <button onclick="switchSubTab('herbs')" class="px-3 py-1.5 text-xs font-bold rounded bg-gray-800 text-gray-400">🧪 Herbs</button>
                    <button onclick="switchSubTab('alchables')" class="px-3 py-1.5 text-xs font-bold rounded bg-gray-800 text-gray-400">💰 Alchables</button>
                    <button onclick="switchSubTab('ammo')" class="px-3 py-1.5 text-xs font-bold rounded bg-gray-800 text-gray-400">🏹 Ammo</button>
                    <button onclick="switchSubTab('custom')" class="px-3 py-1.5 text-xs font-bold rounded bg-gray-800 text-gray-400">⭐ Custom</button>
                </div>
                <table class="w-full text-left">
                    <thead><tr class="text-xs text-gray-400 uppercase tracking-wider border-b border-gray-700"><th class="pb-3">Item</th><th class="pb-3 text-right">Price</th><th class="pb-3 text-center">Action</th></tr></thead>
                    <tbody id="slayer-loot-rows" class="divide-y divide-gray-700/30 text-sm"></tbody>
                </table>
            </section>

            <section class="bg-gray-800 rounded-xl border border-gray-700 p-6">
                <h2 class="text-xl font-bold text-cyan-400 mb-4">Long Term Investments</h2>
                <table class="w-full text-left">
                    <thead><tr class="text-xs text-gray-400 uppercase tracking-wider border-b border-gray-700"><th class="pb-3">Item</th><th class="pb-3 text-right">Qty</th><th class="pb-3 text-right">Entry</th><th class="pb-3 text-right">Target</th><th class="pb-3 text-right">Net Profit</th><th class="pb-3 text-center">Action</th></tr></thead>
                    <tbody id="investment-rows" class="divide-y divide-gray-700/50 text-sm"></tbody>
                </table>
            </section>

            <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-gray-800 rounded-xl border border-gray-700 p-6">
                    <h2 class="text-lg font-bold text-gray-200 mb-4">🛠️ Add to Watchlist</h2>
                    <input type="text" id="input-name" placeholder="Item name..." class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 mb-3 text-sm">
                    <select id="input-category" onchange="toggleFormFields()" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 mb-3 text-sm">
                        <option value="slayer">Add to High Volume</option>
                        <option value="investment">Add to Investments</option>
                    </select>
                    <div id="fields-investment" class="hidden space-y-3 mb-3">
                        <input type="number" id="input-entry" placeholder="Buy Price" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm">
                        <input type="number" id="input-qty" placeholder="Quantity" class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-sm">
                    </div>
                    <button onclick="handleAddAsset()" class="w-full bg-amber-600 text-gray-900 font-bold py-2 rounded text-sm">Add Item</button>
                </div>
                <div class="bg-gray-800 rounded-xl border border-gray-700 p-6">
                    <h2 class="text-xl font-bold text-emerald-400 mb-4">⚡ High-Yield Radar</h2>
                    <table class="w-full text-left text-sm"><tbody id="flipping-radar-rows"></tbody></table>
                </div>
            </section>
        </div>
    </div>

    <script>
        const MASTER_BLUEPRINT_LIST = [ /* ... Use the same blueprint list from previous block ... */ ];
        let userDatabase = { slayerLoot: [], investments: [], history: [] };
        let itemDictionary = null; 
        let rawLivePrices = null; 
        let activeSubTab = "gathering";

        async function initApp() {
            const localData = localStorage.getItem("osrs_dashboard_db");
            userDatabase = localData ? JSON.parse(localData) : { slayerLoot: [], investments: [], history: [] };
            MASTER_BLUEPRINT_LIST.forEach(b => { if (!userDatabase.slayerLoot.find(i => i.id === b.id)) userDatabase.slayerLoot.push(b); });
            await fetchItemDictionary();
            await fetchLivePrices();
        }

        function toggleFormFields() { document.getElementById("fields-investment").classList.toggle("hidden", document.getElementById("input-category").value !== "investment"); }

        function renderInvestmentTable(prices) {
            const t = document.getElementById("investment-rows"); t.innerHTML = "";
            userDatabase.investments.forEach((item, index) => {
                const live = prices[item.id];
                const price = live ? (live.avgLowPrice || live.avgHighPrice || 0) : 0;
                const profit = Math.round((price - (price * 0.02) - item.entryCost) * item.qty);
                t.innerHTML += `<tr class="hover:bg-gray-700/20">
                    <td class="py-3 font-semibold">${item.name}</td>
                    <td class="py-3 text-right">${item.qty}</td>
                    <td class="py-3 text-right">${item.entryCost.toLocaleString()}</td>
                    <td class="py-3 text-right">${Math.round(item.entryCost * 1.12).toLocaleString()}</td>
                    <td class="py-3 text-right font-bold ${profit >= 0 ? 'text-emerald-400' : 'text-rose-400'}">${profit.toLocaleString()}</td>
                    <td class="py-3 text-center"><button onclick="deleteInvestment(${index})" class="text-rose-400 text-xs">Delete</button></td>
                </tr>`;
            });
        }

        function handleAddAsset() {
            const name = document.getElementById("input-name").value.trim();
            const meta = itemDictionary[name.toLowerCase()];
            if (!meta) return alert("Item not found.");
            
            if (document.getElementById("input-category").value === "investment") {
                userDatabase.investments.push({ id: meta.id, name: meta.name, qty: parseInt(document.getElementById("input-qty").value), entryCost: parseInt(document.getElementById("input-entry").value) });
            } else {
                userDatabase.slayerLoot.push({ id: meta.id, name: meta.name });
            }
            saveToLocalStorage(); fetchLivePrices();
        }

        function deleteInvestment(idx) { userDatabase.investments.splice(idx, 1); saveToLocalStorage(); fetchLivePrices(); }
        // ... include fetchLivePrices, renderSlayerTable, and renderFlippingRadar from previous block ...
    </script>
</body>
</html>
